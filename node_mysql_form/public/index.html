<!DOCTYPE html>
<html>
<head>
  <title>Node MySQL CRUD App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .save-btn {
      background: #667eea;
      color: white;
    }

    .save-btn:hover {
      background: #5563c1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }

    table th {
      background: #667eea;
      color: white;
      padding: 10px;
    }

    table td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .edit-btn {
      background: #f6ad55;
      color: white;
      margin-right: 5px;
    }

    .edit-btn:hover {
      background: #dd6b20;
    }

    .delete-btn {
      background: #e53e3e;
      color: white;
    }

    .delete-btn:hover {
      background: #c53030;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🚀 Node MySQL CRUD Application</h2>

  <form id="userForm">
    <input type="hidden" id="id">

    <input type="text" id="user_id" placeholder="Enter User ID" required>
    <input type="email" id="email" placeholder="Enter Email" required>
    <input type="text" id="phone" placeholder="Enter Phone" required>

    <button type="submit" class="save-btn">Save User</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <div class="footer">
    Made with ❤️ using Node.js & MySQL
  </div>

</div>

<script>

function loadUsers() {
  fetch('/users')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('userTable');
      table.innerHTML = '';

      data.forEach(user => {
        table.innerHTML += `
          <tr>
            <td>${user.id}</td>
            <td>${user.user_id}</td>
            <td>${user.email}</td>
            <td>${user.phone}</td>
            <td>
              <button class="edit-btn" onclick="editUser(${user.id}, '${user.user_id}', '${user.email}', '${user.phone}')">Edit</button>
              <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    });
}

document.getElementById('userForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const id = document.getElementById('id').value;
  const user_id = document.getElementById('user_id').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;

  if (id) {
    fetch(`/update/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, email, phone })
    })
    .then(() => {
      loadUsers();
      document.getElementById('userForm').reset();
      document.getElementById('id').value = '';
    });
  } else {
    fetch('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, email, phone })
    })
    .then(() => {
      loadUsers();
      document.getElementById('userForm').reset();
    });
  }
});

function editUser(id, user_id, email, phone) {
  document.getElementById('id').value = id;
  document.getElementById('user_id').value = user_id;
  document.getElementById('email').value = email;
  document.getElementById('phone').value = phone;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteUser(id) {
  if (confirm("Are you sure you want to delete this user?")) {
    fetch(`/delete/${id}`, {
      method: 'DELETE'
    })
    .then(() => loadUsers());
  }
}

loadUsers();

</script>

</body>
</html>
