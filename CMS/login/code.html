<form class="space-y-md">

<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-[44px] pr-sm py-sm bg-surface-bright border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" id="email" name="email" placeholder="name@organization.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-[44px] pr-sm py-sm bg-surface-bright border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-sm flex items-center cursor-pointer text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-sm rounded-lg hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>

<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="mx-md text-label-sm font-label-sm text-outline uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
